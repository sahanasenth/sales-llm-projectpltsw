<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sales CRM Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com/" />
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Sora:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f4f7fb;
        --panel: #ffffff;
        --panel-2: #f8fafc;
        --text: #0f172a;
        --muted: #64748b;
        --line: #e2e8f0;
        --primary: #0f6c5c;
        --primary-dark: #0a4d42;
        --primary-soft: #e7f5f1;
        --blue: #2563eb;
        --blue-soft: #eff6ff;
        --green: #059669;
        --green-soft: #ecfdf5;
        --gray-soft: #f1f5f9;
        --amber-soft: #fffbeb;
        --amber: #d97706;
        --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        --radius: 18px;
        --sidebar-width: 284px;
        --sidebar-collapsed: 88px;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      body {
        min-height: 100vh;
      }
      button,
      input,
      select,
      textarea {
        font: inherit;
      }
      a {
        text-decoration: none;
        color: inherit;
      }

      .app-shell {
        display: grid;
        grid-template-columns: var(--sidebar-width) 1fr;
        min-height: 100vh;
        transition: grid-template-columns 0.25s ease;
      }
      .app-shell.sidebar-collapsed {
        grid-template-columns: var(--sidebar-collapsed) 1fr;
      }

      .sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
        background: linear-gradient(180deg, #0d3f37 0%, #0b2f2a 100%);
        color: #e5f6f2;
        padding: 20px 16px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px;
        min-height: 58px;
      }
      .brand-badge {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.14);
        display: grid;
        place-items: center;
        font-weight: 800;
        letter-spacing: 0.04em;
        flex: 0 0 auto;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
      }
      .brand-copy h1 {
        font-size: 15px;
        margin: 0;
        font-weight: 800;
      }
      .brand-copy p {
        margin: 4px 0 0;
        color: rgba(229, 246, 242, 0.72);
        font-size: 12px;
      }

      .nav-group-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: rgba(229, 246, 242, 0.58);
        margin: 8px 10px 2px;
        font-weight: 700;
      }
      .nav-menu {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .nav-link {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 14px;
        color: rgba(229, 246, 242, 0.86);
        transition:
          background 0.2s ease,
          transform 0.2s ease,
          color 0.2s ease;
        cursor: pointer;
        user-select: none;
        border: 1px solid transparent;
      }
      .nav-link:hover {
        background: rgba(255, 255, 255, 0.08);
        transform: translateX(2px);
      }
      .nav-link.active {
        background: rgba(255, 255, 255, 0.14);
        color: #ffffff;
        border-color: rgba(255, 255, 255, 0.1);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }
      .nav-icon {
        width: 22px;
        text-align: center;
        font-size: 18px;
        flex: 0 0 auto;
      }
      .nav-text {
        font-size: 14px;
        font-weight: 600;
        white-space: nowrap;
      }

      .sidebar-footer {
        margin-top: auto;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 18px;
        padding: 14px;
      }
      .sidebar-footer h3 {
        margin: 0 0 6px;
        font-size: 14px;
      }
      .sidebar-footer p {
        margin: 0;
        font-size: 12px;
        line-height: 1.5;
        color: rgba(229, 246, 242, 0.72);
      }

      .main {
        min-width: 0;
        display: flex;
        flex-direction: column;
      }
      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        background: rgba(244, 247, 251, 0.82);
        backdrop-filter: blur(14px);
        border-bottom: 1px solid rgba(148, 163, 184, 0.16);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 18px 28px;
      }
      .topbar-left {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
        flex: 1;
      }
      .icon-btn {
        width: 42px;
        height: 42px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
        display: grid;
        place-items: center;
        cursor: pointer;
        color: var(--text);
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
      }
      .search-box {
        flex: 1;
        min-width: 220px;
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 0 14px;
        height: 46px;
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
      }
      .search-box input {
        flex: 1;
        border: 0;
        outline: none;
        background: transparent;
        color: var(--text);
      }
      .topbar-right {
        display: flex;
        align-items: center;
        gap: 12px;
        position: relative;
      }
      .avatar-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 8px 6px 6px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--panel);
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
      }
      .avatar {
        width: 36px;
        height: 36px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, var(--primary), #16a085);
        color: white;
        font-weight: 800;
      }
      .avatar-copy strong {
        display: block;
        font-size: 13px;
        line-height: 1.1;
      }
      .avatar-copy span {
        display: block;
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }
      .profile-menu {
        position: absolute;
        right: 0;
        top: calc(100% + 10px);
        width: 210px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: var(--shadow);
        padding: 8px;
        display: none;
      }
      .profile-menu.open {
        display: block;
      }
      .profile-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        color: var(--text);
        cursor: pointer;
      }
      .profile-item:hover {
        background: var(--panel-2);
      }

      .page {
        padding: 28px;
        display: flex;
        flex-direction: column;
        gap: 22px;
      }
      .page-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
        flex-wrap: wrap;
      }
      .page-title h2 {
        margin: 0;
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.03em;
      }
      .page-title p {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.5;
        max-width: 760px;
      }
      .page-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 44px;
        border-radius: 12px;
        padding: 0 16px;
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--text);
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
      }
      .btn-primary {
        border-color: transparent;
        background: linear-gradient(135deg, var(--primary), #17856f);
        color: white;
        box-shadow: 0 10px 20px rgba(15, 108, 92, 0.18);
      }
      .btn-secondary {
        background: var(--panel-2);
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 18px;
      }
      .card {
        background: var(--panel);
        border: 1px solid rgba(226, 232, 240, 0.9);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .stat-card {
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .stat-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .stat-icon {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        background: var(--primary-soft);
        color: var(--primary-dark);
        font-size: 20px;
      }
      .stat-card small {
        color: var(--muted);
        font-weight: 600;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .stat-card h3 {
        margin: 0;
        font-size: 26px;
        letter-spacing: -0.03em;
      }
      .trend {
        font-size: 12px;
        font-weight: 700;
        color: var(--green);
      }

      .split-grid {
        display: grid;
        grid-template-columns: 1.5fr 1fr;
        gap: 18px;
      }
      .card-header {
        padding: 18px 20px 14px;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .card-header h3 {
        margin: 0;
        font-size: 18px;
      }
      .card-header p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 13px;
      }
      .card-body {
        padding: 18px 20px 20px;
      }

      .table-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 16px 20px;
        border-bottom: 1px solid var(--line);
        flex-wrap: wrap;
      }
      .toolbar-left,
      .toolbar-right {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .control {
        height: 42px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
        padding: 0 14px;
        color: var(--text);
        min-width: 130px;
        outline: none;
      }
      .control.search {
        min-width: 240px;
      }
      .table-wrap {
        width: 100%;
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 720px;
      }
      th,
      td {
        padding: 14px 20px;
        text-align: left;
        border-bottom: 1px solid var(--line);
        font-size: 14px;
      }
      th {
        color: var(--muted);
        font-weight: 700;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        background: #fbfdff;
        position: sticky;
        top: 0;
      }
      tbody tr:hover {
        background: #f8fbfd;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        height: 30px;
        padding: 0 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }
      .badge.submitted {
        background: var(--blue-soft);
        color: var(--blue);
      }
      .badge.draft {
        background: var(--gray-soft);
        color: #475569;
      }
      .badge.closed,
      .badge.completed {
        background: var(--green-soft);
        color: var(--green);
      }
      .badge.pending,
      .badge.scheduled {
        background: var(--amber-soft);
        color: var(--amber);
      }
      .badge.hot {
        background: #fef2f2;
        color: #dc2626;
      }
      .badge.warm {
        background: #fff7ed;
        color: #ea580c;
      }
      .badge.cold {
        background: #eff6ff;
        color: #2563eb;
      }

      .empty-state {
        padding: 26px 20px;
        color: var(--muted);
        text-align: center;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .field.full {
        grid-column: 1 / -1;
      }
      .field label {
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .field input,
      .field select,
      .field textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px 14px;
        background: var(--panel);
        outline: none;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }
      .field input.error,
      .field select.error,
      .field textarea.error {
        border-color: #dc2626;
        box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
      }
      .field .error-msg {
        font-size: 11px;
        color: #dc2626;
        margin-top: 2px;
        display: none;
      }
      .field.has-error .error-msg {
        display: block;
      }
      .field input:focus,
      .field select:focus,
      .field textarea:focus {
        border-color: rgba(15, 108, 92, 0.4);
        box-shadow: 0 0 0 4px rgba(15, 108, 92, 0.08);
      }
      .field textarea {
        min-height: 120px;
        resize: vertical;
      }
      .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 18px;
        flex-wrap: wrap;
      }

      .form-section {
        grid-column: 1 / -1;
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid var(--line);
      }
      .form-section:first-child {
        margin-top: 0;
        padding-top: 0;
        border-top: 0;
      }
      .form-section h4 {
        margin: 0 0 12px;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      .field-hint {
        font-size: 12px;
        color: var(--muted);
        margin-top: 4px;
      }

      .choice-group {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .choice-chip {
        position: relative;
        display: inline-flex;
        align-items: center;
        cursor: pointer;
      }
      .choice-chip input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }
      .choice-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 92px;
        height: 42px;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--panel);
        font-weight: 700;
        transition: all 0.2s ease;
      }
      .choice-chip input:checked + .choice-pill {
        border-color: transparent;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
      }
      .choice-chip.hot input:checked + .choice-pill {
        background: #fef2f2;
        color: #dc2626;
      }
      .choice-chip.warm input:checked + .choice-pill {
        background: #fff7ed;
        color: #ea580c;
      }
      .choice-chip.cold input:checked + .choice-pill {
        background: #eff6ff;
        color: #2563eb;
      }

      .conditional-section {
        grid-column: 1 / -1;
        display: none;
        padding: 16px;
        border: 1px dashed var(--line);
        border-radius: 16px;
        background: #fbfdff;
      }
      .conditional-section.show {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .helper-note {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 14px 16px;
        border-radius: 14px;
        background: var(--primary-soft);
        color: var(--primary-dark);
        font-size: 14px;
        line-height: 1.5;
        border: 1px solid rgba(15, 108, 92, 0.12);
      }

      .list-stack {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .list-item {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 14px 16px;
        border-radius: 14px;
        background: var(--panel-2);
        border: 1px solid var(--line);
      }
      .list-item strong {
        display: block;
        font-size: 14px;
      }
      .list-item span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin-top: 4px;
      }

      .sidebar-collapsed .brand-copy,
      .sidebar-collapsed .nav-text,
      .sidebar-collapsed .nav-group-title,
      .sidebar-collapsed .sidebar-footer {
        display: none;
      }
      .sidebar-collapsed .brand,
      .sidebar-collapsed .nav-link {
        justify-content: center;
      }

      .toast-container {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 999;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .toast {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px 18px;
        box-shadow: var(--shadow);
        font-size: 14px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 260px;
        animation: slideIn 0.25s ease;
      }
      .toast.success {
        border-left: 4px solid var(--green);
      }
      .toast.error {
        border-left: 4px solid #dc2626;
      }
      .toast.warning {
        border-left: 4px solid var(--amber);
        color: var(--amber);
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 1180px) {
        .stats-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .split-grid {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 900px) {
        .app-shell {
          grid-template-columns: 1fr;
        }
        .sidebar {
          position: fixed;
          z-index: 40;
          width: var(--sidebar-width);
          transform: translateX(-100%);
          transition: transform 0.25s ease;
        }
        .app-shell.mobile-sidebar-open .sidebar {
          transform: translateX(0);
        }
        .main {
          width: 100%;
        }
        .page,
        .topbar {
          padding-left: 18px;
          padding-right: 18px;
        }
        .stats-grid {
          grid-template-columns: 1fr;
        }
        .form-grid {
          grid-template-columns: 1fr;
        }
        .avatar-copy {
          display: none;
        }
      }

      /* ═══════════════════════════════════════════════════════════════
       AUTH — LOGIN PAGE
    ═══════════════════════════════════════════════════════════════ */
      #authOverlay {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #060e0c;
        transition: opacity 0.5s ease;
      }
      #authOverlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      /* Animated background mesh */
      .auth-bg {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      .auth-bg-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        animation: orbFloat 8s ease-in-out infinite;
      }
      .auth-bg-orb:nth-child(1) {
        width: 500px;
        height: 500px;
        background: radial-gradient(
          circle,
          rgba(15, 108, 92, 0.35) 0%,
          transparent 70%
        );
        top: -120px;
        left: -120px;
        animation-delay: 0s;
      }
      .auth-bg-orb:nth-child(2) {
        width: 400px;
        height: 400px;
        background: radial-gradient(
          circle,
          rgba(37, 99, 235, 0.2) 0%,
          transparent 70%
        );
        bottom: -80px;
        right: -80px;
        animation-delay: -3s;
      }
      .auth-bg-orb:nth-child(3) {
        width: 300px;
        height: 300px;
        background: radial-gradient(
          circle,
          rgba(15, 108, 92, 0.15) 0%,
          transparent 70%
        );
        top: 50%;
        left: 60%;
        animation-delay: -5s;
      }
      @keyframes orbFloat {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(20px, -30px) scale(1.05);
        }
        66% {
          transform: translate(-15px, 20px) scale(0.97);
        }
      }

      /* Grid texture overlay */
      .auth-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size: 48px 48px;
        pointer-events: none;
      }

      .auth-card {

      .auth-heading {

      .auth-field {

      /* Password toggle */
      .auth-pw-toggle {

      @keyframes shake {

      /* ═══════════════════════════════════════════════════════════════
       FIX 1 — REMEMBER ME CHECKBOX
    ═══════════════════════════════════════════════════════════════ */
      .auth-remember-row {
        display: flex;

      .auth-remember-label input[type="checkbox"] {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
        pointer-events: none;
      }
      /* Custom checkbox box */
      .auth-remember-checkbox {
        width: 18px;
        height: 18px;
        border-radius: 6px;
        border: 1.5px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.05);

        align-items: center;

        flex: 0 0 auto;
        transition:
          border-color 0.2s,
          background 0.2s,
          box-shadow 0.2s;
        position: relative;
      }
      /* Checkmark via pseudo-element */
      .auth-remember-checkbox::after {
        content: "";
        width: 5px;
        height: 9px;
        border: 2px solid white;
        border-top: none;
        border-left: none;
        transform: rotate(45deg) translateY(-1px);
        opacity: 0;
        transition: opacity 0.15s ease;

      /* Checked state */
      .auth-remember-label input:checked + .auth-remember-checkbox {
        background: var(--primary);
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(15, 108, 92, 0.2);

      }
      .auth-remember-text {

        font-weight: 500;
        color: rgba(255, 255, 255, 0.5);

      /* ═══════════════════════════════════════════════════════════════
       FIX 2 — BROWSER AUTOFILL STYLING (Chrome / Edge / WebKit)
       Overrides the default yellow/white autofill background to match

    ═══════════════════════════════════════════════════════════════ */
      .auth-field input:-webkit-autofill,
      .auth-field input:-webkit-autofill:hover,
      .auth-field input:-webkit-autofill:focus,
      .auth-field input:-webkit-autofill:active {

        -webkit-box-shadow: 0 0 0 1000px rgba(15, 25, 22, 0.95) inset !important;
        box-shadow: 0 0 0 1000px rgba(15, 25, 22, 0.95) inset !important;
        -webkit-text-fill-color: #ffffff !important;
        caret-color: #ffffff;
        border-color: rgba(15, 108, 92, 0.5) !important;
        border-radius: 14px;
        transition: background-color 9999s ease-in-out 0s; /* Delay browser override */

      .auth-field input:autofill {

        color: #ffffff !important;

      /* ═══════════════════════════════════════════════════════════════

    ═══════════════════════════════════════════════════════════════ */

        #authOverlay {
          align-items: flex-start;

    </style>
  </head>
  <body>
    <!-- ═══════════════════════════════════════════════════════════════
       AUTH OVERLAY — Login Page
  ═══════════════════════════════════════════════════════════════ -->
    <div id="authOverlay" role="main" aria-label="Login">
      <!-- Animated background -->
      <div class="auth-bg" aria-hidden="true">
        <div class="auth-bg-orb"></div>
        <div class="auth-bg-orb"></div>
        <div class="auth-bg-orb"></div>
        <div class="auth-grid"></div>
      </div>

      <!-- Login card -->
      <div class="auth-card" role="form" aria-labelledby="authHeading">
        <div class="auth-brand">
          <div class="auth-brand-badge">SC</div>
          <div class="auth-brand-copy">
            <h2>Sales Command</h2>
            <p>Professional CRM Workspace</p>
          </div>
        </div>

        <h1 class="auth-heading" id="authHeading">Welcome back</h1>
        <p class="auth-subheading">
          Sign in to access your CRM dashboard and sales tools.
        </p>

        <!-- Error banner -->
        <div
          class="auth-error-banner"
          id="authErrorBanner"
          role="alert"
          aria-live="assertive"
        >
          <span>⚠</span>
          <span id="authErrorText">Invalid credentials. Please try again.</span>
        </div>

        <!-- Login form -->
        <form id="loginForm" novalidate autocomplete="on">
          <div class="auth-field">
            <label for="authUsername">Username or Email</label>
            <div class="auth-input-wrap">
              <input
                type="text"
                id="authUsername"
                name="username"
                placeholder="Enter username or email"
                autocomplete="username"
                aria-required="true"
              />
              <span class="auth-input-icon" aria-hidden="true">👤</span>
            </div>
          </div>

          <div class="auth-field">
            <label for="authPassword">Password</label>
            <div class="auth-input-wrap">
              <input
                type="password"
                id="authPassword"
                name="password"
                placeholder="Enter your password"
                autocomplete="current-password"
                aria-required="true"
              />
              <span class="auth-input-icon" aria-hidden="true">🔑</span>
              <button
                type="button"
                class="auth-pw-toggle"
                id="pwToggle"
                aria-label="Toggle password visibility"
              >
                👁
              </button>
            </div>
          </div>

          <!-- Remember Me -->
          <div class="auth-remember-row">
            <label class="auth-remember-label" for="rememberMe">
              <input type="checkbox" id="rememberMe" name="rememberMe" />
              <span class="auth-remember-checkbox" aria-hidden="true"></span>
              <span class="auth-remember-text">Remember me for 7 days</span>
            </label>
          </div>

          <button
            type="submit"
            class="auth-btn"
            id="loginBtn"
            aria-label="Sign in"
          >
            <span id="loginBtnText">Sign In</span>
          </button>
        </form>
      </div>
    </div>

    <div class="app-shell" id="appShell">
      <aside class="sidebar" id="sidebar"></aside>
      <div class="main">
        <header class="topbar" id="topbar"></header>
        <main class="page" id="pageRoot"></main>
      </div>
    </div>
    <div class="toast-container" id="toastContainer"></div>

    <script>
      /* ═══════════════════════════════════════════════════════════════
       AUTH MODULE — Complete Frontend Authentication Workflow
    ═══════════════════════════════════════════════════════════════ */

      /* ── Auth Token Keys ── */
      const AUTH_KEYS = {
        ACCESS_TOKEN: "crm_accessToken",
        REFRESH_TOKEN: "crm_refreshToken",
        LOGGED_IN_USER: "crm_loggedInUser",
        TOKEN_EXPIRY: "crm_tokenExpiry",
        REMEMBER_ME: "crm_rememberMe",
        REMEMBERED_USER: "crm_rememberedUser",
      };

      /* ── Session-expiry notification flag (sessionStorage, cleared on browser close) ── */
      const SESSION_EXPIRED_FLAG = "crm_sessionExpired";

      /* ── Refresh lock: prevents concurrent refresh storms ── */
      let _refreshing = null;

      /* ═══════════════════════════════════════════════════════════════
       AUTH — Core Functions
    ═══════════════════════════════════════════════════════════════ */
      const Auth = {
        verifiedRole: null,
        verifiedUser: null,

        /* ── Save tokens with expiry based on Remember Me ── */
        saveTokens(username, accessToken, refreshToken, rememberMe = false) {
          const decoded = this.parseJwt(accessToken);
          if (!decoded?.exp || !VALID_ROLES.includes(decoded.role)) {
            throw new Error("Invalid access token received from server");
          }
          const expiry = decoded.exp * 1000;

          localStorage.setItem(AUTH_KEYS.ACCESS_TOKEN, accessToken);
          localStorage.setItem(AUTH_KEYS.REFRESH_TOKEN, refreshToken);
          localStorage.setItem(AUTH_KEYS.LOGGED_IN_USER, username);
          localStorage.setItem(AUTH_KEYS.TOKEN_EXPIRY, String(expiry));
          this.verifiedRole = null;
          this.verifiedUser = null;
        },

        /* ── Save/load/clear Remember Me preferences ── */
        saveSession(username, rememberMe) {
          if (rememberMe) {
            localStorage.setItem(AUTH_KEYS.REMEMBER_ME, "true");
            localStorage.setItem(AUTH_KEYS.REMEMBERED_USER, username);
          } else {
            // Not remembered — clear any previous remembered state
            localStorage.removeItem(AUTH_KEYS.REMEMBER_ME);
            localStorage.removeItem(AUTH_KEYS.REMEMBERED_USER);
          }
        },

        loadRememberedUser() {
          const isRemembered =
            localStorage.getItem(AUTH_KEYS.REMEMBER_ME) === "true";
          if (isRemembered) {
            return localStorage.getItem(AUTH_KEYS.REMEMBERED_USER) || null;
          }
          return null;
        },

        clearRememberedSession() {
          localStorage.removeItem(AUTH_KEYS.REMEMBER_ME);
          localStorage.removeItem(AUTH_KEYS.REMEMBERED_USER);
        },

        /* ── Clear all auth tokens ── */
        clearTokens() {
          localStorage.removeItem(AUTH_KEYS.ACCESS_TOKEN);
          localStorage.removeItem(AUTH_KEYS.REFRESH_TOKEN);
          localStorage.removeItem(AUTH_KEYS.LOGGED_IN_USER);
          localStorage.removeItem(AUTH_KEYS.TOKEN_EXPIRY);
          this.verifiedRole = null;
          this.verifiedUser = null;
          // Note: REMEMBER_ME and REMEMBERED_USER are intentionally preserved
          // here so the username is still pre-filled after session expiry.
          // They are only cleared on explicit logoutUser() call.
        },

        /* ── Check if user is authenticated (token exists + not expired) ── */
        isAuthenticated() {
          const token = localStorage.getItem(AUTH_KEYS.ACCESS_TOKEN);
          if (!token) return false;
          const decoded = this.parseJwt(token);
          if (!decoded || !decoded.exp || !VALID_ROLES.includes(decoded.role)) {
            this.clearTokens();
            return false;
          }

          const expMs = decoded.exp * 1000;
          if (Date.now() > expMs) {
            sessionStorage.setItem(SESSION_EXPIRED_FLAG, "true");
            this.clearTokens();
            return false;
          }
          return true;
        },

        /* ── Get the currently logged-in username ── */
        getLoggedInUser() {
          return localStorage.getItem(AUTH_KEYS.LOGGED_IN_USER) || null;
        },

        /* ── Get the currently logged-in user role ── */
        getUserRole() {
          if (this.verifiedRole) return this.verifiedRole;
          // Always derive role from signed JWT to avoid trusting mutable localStorage values
          const token = this.getAccessToken();
          if (!token) return null;
          const decoded = this.parseJwt(token);
          if (!decoded) return null;
          // Respect token expiry embedded in JWT
          if (decoded.exp && Date.now() > decoded.exp * 1000) return null;
          return VALID_ROLES.includes(decoded.role) ? decoded.role : null;
        },

        /* ── Get access token (for use in API requests) ── */
        getAccessToken() {
          return localStorage.getItem(AUTH_KEYS.ACCESS_TOKEN) || null;
        },

        /* ── Validate login form fields ── */
        validateLoginForm(username, password) {
          const errors = [];
          if (!username || !username.trim()) {
            errors.push({
              field: "username",
              message: "Username or email is required.",
            });
          } else if (username.trim().length < 3) {
            errors.push({
              field: "username",
              message: "Username must be at least 3 characters.",
            });
          }
          if (!password || !password.trim()) {
            errors.push({
              field: "password",
              message: "Password is required.",
            });
          } else if (password.length < 6) {
            errors.push({
              field: "password",
              message: "Password must be at least 6 characters.",
            });
          }
          return { valid: errors.length === 0, errors };
        },

        /* ── Helper: Parse JWT without external libraries ── */
        parseJwt(token) {
          try {
            if (!token || token.split(".").length !== 3) return null;
            const base64Url = token.split(".")[1];
            if (!base64Url) return null;
            const base64 = base64Url.replace(/-/g, "+").replace(/_/g, "/");
            const jsonPayload = decodeURIComponent(
              atob(base64)
                .split("")
                .map(function (c) {
                  return "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2);
                })
                .join(""),
            );
            return JSON.parse(jsonPayload);
          } catch (e) {
            return null;
          }
        },

        requireValidSession() {
          if (!this.isAuthenticated() || !this.verifiedRole) {
            this.clearTokens();
            this._resetAppState();
            this.showLoginPage();
            return false;
          }
          return true;
        },

        async verifySessionWithBackend() {
          if (!this.isAuthenticated()) return false;
          const token = this.getAccessToken();
          const response = await fetch("http://127.0.0.1:8000/api/auth/me/", {
            method: "GET",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
          });
          if (!response.ok) {
            this.clearTokens();
            return false;
          }
          const data = await response.json();
          if (!VALID_ROLES.includes(data.role)) {
            this.clearTokens();
            return false;
          }
          const tokenRole = this.getUserRole();
          if (tokenRole && tokenRole !== data.role) {
            this.clearTokens();
            return false;
          }
          this.verifiedRole = data.role;
          this.verifiedUser = data.username;
          if (data.username) {
            localStorage.setItem(AUTH_KEYS.LOGGED_IN_USER, data.username);
          }
          return true;
        },

        /* ── Main loginUser function ── */
        async loginUser(username, password, rememberMe = false) {
          const response = await fetch("http://127.0.0.1:8000/api/token/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });

          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            throw new Error(errData.detail || "Invalid credentials");
          }

          const data = await response.json();

          // Decode token to extract verified claims
          const decoded = this.parseJwt(data.access);
          const serverUsername = decoded?.username || username;

          this.saveTokens(
            serverUsername,
            data.access,
            data.refresh,
            rememberMe,
          );
          this.saveSession(serverUsername, rememberMe);
          const verified = await this.verifySessionWithBackend();
          if (!verified) {
            throw new Error("Unable to verify authenticated session");
          }
          return data;
        },

        /* ── Logout: clears all tokens, resets appState, returns to login ── */
        logoutUser() {
          this.clearTokens();
          this.clearRememberedSession();
          this._resetAppState();
          // Clear in-memory data store so stale data is never visible after re-login
          if (typeof Store !== "undefined") {
            Store.setEnquiries([]);
            Store.setAppointments([]);
            Store.setFeedback([]);
          }
          this.showLoginPage();
          Utils.toast("You have been signed out successfully.", "success");
        },

        /* ── FIX 4: Full appState reset on logout ── */
        _resetAppState() {
          appState.currentView = "dashboard";
          appState.sidebarCollapsed = false;
          appState.mobileSidebarOpen = false;
          appState.search = "";
          appState.filters = {
            enquiries: { status: "all", vehicle: "all", date: "all" },
            appointments: { status: "all", vehicle: "all", date: "all" },
            feedback: { status: "all", vehicle: "all", date: "all" },
          };
          appState.formDraft = {};
          // Clear persisted UI state so next login starts fresh
          try {
            localStorage.removeItem(LS_KEY + "_" + UI_STATE_STORAGE_KEY);
          } catch {}
        },

        /* ── authFetch: Authenticated API requests with automatic token refresh ── */
        async authFetch(url, options = {}, _isRetry = false) {
          if (!this.isAuthenticated() || !this.verifiedRole) {
            this.clearTokens();
            this._resetAppState();
            this.showLoginPage();
            throw new Error("Invalid or expired session.");
          }
          const token = this.getAccessToken();
          const headers = {
            "Content-Type": "application/json",
            ...(options.headers || {}),
            ...(token ? { Authorization: `Bearer ${token}` } : {}),
          };

          const response = await fetch(url, { ...options, headers });

          if (response.status === 401 && !_isRetry) {
            // Attempt token refresh exactly once
            const refreshed = await this.refreshAccessToken();
            if (refreshed) {
              // Retry original request with new token
              return this.authFetch(url, options, true);
            }
            // Refresh failed — force logout with session expired notice
            sessionStorage.setItem(SESSION_EXPIRED_FLAG, "true");
            this.clearTokens();
            this._resetAppState();
            this.showLoginPage();
            this._checkSessionExpiry();
            throw new Error("Session expired. Please sign in again.");
          }

          return response;
        },

        /* ── Token Refresh: calls /api/token/refresh/ and updates access token ── */
        async refreshAccessToken() {
          // Deduplicate concurrent refresh calls — only one in-flight at a time
          if (_refreshing) return _refreshing;

          _refreshing = (async () => {
            try {
              const refreshToken = localStorage.getItem(
                AUTH_KEYS.REFRESH_TOKEN,
              );
              if (!refreshToken) return false;

              const response = await fetch(
                "http://127.0.0.1:8000/api/token/refresh/",
                {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ refresh: refreshToken }),
                },
              );

              if (!response.ok) return false;

              const data = await response.json();
              if (!data.access) return false;

              // Update stored access token and set expiry based on JWT exp claim when available
              localStorage.setItem(AUTH_KEYS.ACCESS_TOKEN, data.access);
              const decoded = this.parseJwt(data.access) || {};
              if (!decoded.exp || !VALID_ROLES.includes(decoded.role))
                return false;
              localStorage.setItem(
                AUTH_KEYS.TOKEN_EXPIRY,
                String(decoded.exp * 1000),
              );
              this.verifiedRole = decoded.role;

              return true;
            } catch {
              return false;
            } finally {
              _refreshing = null;
            }
          })();

          return _refreshing;
        },

        /* ── Show dashboard (called after successful login) ── */
        showDashboard() {
          const overlay = document.getElementById("authOverlay");
          const shell = document.getElementById("appShell");
          if (overlay) {
            overlay.style.opacity = "0";
            setTimeout(() => {
              overlay.style.display = "none";
              overlay.classList.add("hidden");
            }, 500);
          }
          if (shell) shell.classList.add("auth-visible");
        },

        /* ── Show login page (called on logout or unauthenticated access) ── */
        showLoginPage() {
          const overlay = document.getElementById("authOverlay");
          const shell = document.getElementById("appShell");
          if (overlay) {
            overlay.style.display = "flex";
            overlay.style.opacity = "1";
            overlay.classList.remove("hidden");
            // Reset form state
            const form = document.getElementById("loginForm");
            if (form) form.reset();
            const errBanner = document.getElementById("authErrorBanner");
            if (errBanner) errBanner.classList.remove("visible");
            // Re-populate remembered username if applicable
            this._restoreRememberedUser();
          }
          if (shell) shell.classList.remove("auth-visible");
        },

        /* ── Pre-fill remembered username on login page ── */
        _restoreRememberedUser() {
          const remembered = this.loadRememberedUser();
          const usernameEl = document.getElementById("authUsername");
          const rememberEl = document.getElementById("rememberMe");
          if (usernameEl && remembered) {
            usernameEl.value = remembered;
          }
          if (rememberEl && remembered) {
            rememberEl.checked = true;
          }
        },

        /* ── FIX 5: Show session expiry notification if flag is set ── */
        _checkSessionExpiry() {
          const wasExpired = sessionStorage.getItem(SESSION_EXPIRED_FLAG);
          if (wasExpired) {
            sessionStorage.removeItem(SESSION_EXPIRED_FLAG);
            // Delay slightly so the login page renders first
            setTimeout(() => {
              const errBanner = document.getElementById("authErrorBanner");
              const errText = document.getElementById("authErrorText");
              if (errBanner && errText) {
                errText.textContent =
                  "Your session has expired. Please sign in again.";
                errBanner.classList.add("visible");
              }
              // Also fire an amber-styled toast for clear UX feedback
              Utils.toast("Session expired — please sign in again.", "warning");
            }, 300);
          }
        },

        /* ── Initialize authentication on page load ── */
        initializeAuth() {
          return new Promise(async (resolve) => {
            if (
              this.isAuthenticated() &&
              (await this.verifySessionWithBackend())
            ) {
              const role = this.getUserRole();

              const hash = window.location.hash.replace("#", "");
              const defaultRoute = DEFAULT_ROUTE_BY_ROLE[role] || "dashboard";
              const requestedView =
                hash || appState.currentView || defaultRoute;
              Router.navigate(
                resolveNavigationTarget(requestedView, role).viewId,
              );
              this.showDashboard();
              resolve();
            } else {
              this.clearTokens();
              this.showLoginPage();
              this._checkSessionExpiry();
              resolve();
            }
            this._bindLoginForm();
          });
        },

        /* ── Bind login form events ── */
        _bindLoginForm() {
          const form = document.getElementById("loginForm");
          const loginBtn = document.getElementById("loginBtn");
          const pwToggle = document.getElementById("pwToggle");
          const pwInput = document.getElementById("authPassword");
          const errBanner = document.getElementById("authErrorBanner");
          const errText = document.getElementById("authErrorText");

          if (!form) return;

          // Password visibility toggle
          if (pwToggle && pwInput) {
            pwToggle.addEventListener("click", () => {
              const isHidden = pwInput.type === "password";
              pwInput.type = isHidden ? "text" : "password";
              pwToggle.textContent = isHidden ? "🙈" : "👁";
            });
          }

          // Clear error styling on input
          ["authUsername", "authPassword"].forEach((id) => {
            const el = document.getElementById(id);
            if (el) {
              el.addEventListener("input", () => {
                el.classList.remove("auth-error");
                if (errBanner) errBanner.classList.remove("visible");
              });
            }
          });

          // Form submit
          form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const usernameEl = document.getElementById("authUsername");
            const passwordEl = document.getElementById("authPassword");
            const rememberEl = document.getElementById("rememberMe");
            const username = usernameEl?.value || "";
            const password = passwordEl?.value || "";
            const rememberMe = rememberEl?.checked || false;

            // Frontend validation
            const validation = Auth.validateLoginForm(username, password);
            if (!validation.valid) {
              validation.errors.forEach((err) => {
                const fieldEl = document.getElementById(
                  err.field === "username" ? "authUsername" : "authPassword",
                );
                if (fieldEl) fieldEl.classList.add("auth-error");
              });
              if (errBanner && errText) {
                errText.textContent = validation.errors[0].message;
                errBanner.classList.add("visible");
              }
              return;
            }

            // Loading state
            if (loginBtn) {
              loginBtn.disabled = true;
              loginBtn.innerHTML = '<span class="auth-spinner"></span>';
            }

            try {
              await Auth.loginUser(username, password, rememberMe);

              // Load backend data now that the user is authenticated
              await Actions.refreshAll();

              // Success — resolve the route before revealing the shell
              const role = Auth.getUserRole();

              if (role === "director") {
                Utils.toast(
                  "Welcome, Director. Accessing Strategic Panel...",
                  "success",
                );
                Router.navigate(DEFAULT_ROUTE_BY_ROLE.director);
              } else if (role === "admin") {
                Router.navigate(DEFAULT_ROUTE_BY_ROLE.admin);
                Utils.toast("Welcome, Admin. Accessing controls.", "success");
              } else {
                Router.navigate(DEFAULT_ROUTE_BY_ROLE[role] || "dashboard");
                Utils.toast(
                  `Welcome back, ${Auth.getLoggedInUser()}! 🎉`,
                  "success",
                );
              }

              Auth.showDashboard();

              // Re-render topbar to show logged-in user info
              Renderer.topbar();
            } catch (err) {
              // Failed login — highlight fields and show error
              if (usernameEl) usernameEl.classList.add("auth-error");
              if (passwordEl) passwordEl.classList.add("auth-error");
              if (errBanner && errText) {
                errText.textContent =
                  "Invalid username or password. Please try again.";
                errBanner.classList.add("visible");
              }
            } finally {
              if (loginBtn) {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<span id="loginBtnText">Sign In</span>';
              }
            }
          });
        },
      };

      /* ── localStorage helpers ── */
      const LS_KEY = "salesCRM_modular";
      const _load = (key) => {
        try {
          const v = localStorage.getItem(LS_KEY + "_" + key);
          return v ? JSON.parse(v) : null;
        } catch {
          return null;
        }
      };
      const _save = (key, data) => {
        try {
          localStorage.setItem(LS_KEY + "_" + key, JSON.stringify(data));
        } catch {
          /* storage full — fail silently */
        }
      };

      const Persist = {
        saveUI() {
          _save(UI_STATE_STORAGE_KEY, {
            currentView: appState.currentView,
            sidebarCollapsed: appState.sidebarCollapsed,
            search: appState.search,
            filters: appState.filters,
          });
        },
        loadUI() {
          const saved = _load(UI_STATE_STORAGE_KEY);
          if (!saved || typeof saved !== "object") return;

          if (
            typeof saved.currentView === "string" &&
            saved.currentView in Views
          ) {
            appState.currentView = saved.currentView;
          }
          if (typeof saved.sidebarCollapsed === "boolean") {
            appState.sidebarCollapsed = saved.sidebarCollapsed;
          }
          if (typeof saved.search === "string") {
            appState.search = saved.search;
          }
          if (saved.filters && typeof saved.filters === "object") {
            Object.keys(appState.filters).forEach((key) => {
              const src = saved.filters[key];
              if (!src || typeof src !== "object") return;
              appState.filters[key] = {
                status: typeof src.status === "string" ? src.status : "all",
                vehicle: typeof src.vehicle === "string" ? src.vehicle : "all",

        if (!navItem) {

            item.id.startsWith(resolvedViewId),
          );

        if (!navItem) {
          return {
            viewId: resolvedViewId,
            navItem: null,
            allowed: false,
            deniedRoute: resolvedViewId || "Unknown route",
          };

        return {
          viewId: navItem.id,
          navItem,
          allowed: !navItem.roles || navItem.roles.includes(role),
          deniedRoute: navItem.label,

      /* ═══════════════════════════════════════════════════════════════
       UTILITIES
    ═══════════════════════════════════════════════════════════════ */
      const Utils = {
        escape(value) {
          return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
        },
        capitalize(value) {
          return String(value).charAt(0).toUpperCase() + String(value).slice(1);
        },
        badgeClass(status) {
          const key = String(status).toLowerCase();
          const map = {
            submitted: "submitted",
            closed: "closed",
            completed: "completed",
            scheduled: "scheduled",
            pending: "pending",
            hot: "hot",
            warm: "warm",
            cold: "cold",
          };
          return map[key] || "draft";
        },
        uniqueValues(rows, key) {
          return [...new Set(rows.map((r) => r[key]).filter(Boolean))];
        },
        filterRows(rows, config, searchKeys) {
          const q = appState.search.trim().toLowerCase();
          return rows.filter((row) => {
            const searchMatch =
              !q ||
              searchKeys.some((key) =>
                String(row[key] || "")
                  .toLowerCase()
                  .includes(q),
              );
            const statusMatch =
              config.status === "all" ||
              String(row.status || "").toLowerCase() === config.status;
            const vehicleMatch =
              config.vehicle === "all" ||
              String(row.vehicle || "").toLowerCase() === config.vehicle;
            const dateMatch =
              config.date === "all" ||
              String(row.date || "").startsWith(config.date);
            return searchMatch && statusMatch && vehicleMatch && dateMatch;
          });
        },
        toast(message, type = "success") {
          const container = document.getElementById("toastContainer");
          const el = document.createElement("div");
          el.className = `toast ${type}`;
          const icons = { success: "✓", error: "✕", warning: "⚠" };
          const icon = icons[type] || "✓";
          el.innerHTML = `<span>${icon}</span> ${Utils.escape(message)}`;
          container.appendChild(el);
          setTimeout(() => {
            el.style.opacity = "0";
            el.style.transition = "opacity 0.3s";
            setTimeout(() => el.remove(), 300);
          }, 3200);
        },
        computeMetrics() {
          const rows = Store.enquiries;
          const submitted = rows.filter((r) => r.status === "Submitted").length;
          const draft = rows.filter((r) => r.status === "Draft").length;
          const closed = rows.filter((r) => r.status === "Closed").length;
          return [
            {
              label: "Total Enquiries",
              value: rows.length,
              icon: "◎",
              trend: "-",
            },
            {
              label: "Open Pipeline",
              value: submitted + draft,
              icon: "◔",
              trend: "-",
            },
            {
              label: "Appointments",
              value: Store.appointments.length,
              icon: "◫",
              trend: "-",
            },
            {
              label: "Closed Leads",
              value: closed,
              icon: "✓",
              trend: "-",
            },
          ];
        },
      };

        /* ── Card ── */

        /* ── Table ── */
        table(cfg, rows) {
          const {
            title,
            subtitle,
            tableKey,
            columns,
            searchKeys,
            addLabel,
            addView,
          } = cfg;
          const config = appState.filters[tableKey];
          const filtered = Utils.filterRows(rows, config, searchKeys);
          const vehicleOpts = Utils.uniqueValues(rows, "vehicle");
          const monthOpts = [
            ...new Set(rows.map((r) => String(r.date).slice(0, 7))),
          ];

          const statusOptions = [
            ...new Set(rows.map((r) => String(r.status).toLowerCase())),
          ];

          const toolbar = `
          <div class="table-toolbar">
            <div class="toolbar-left">
              <select class="control" data-filter="${tableKey}" data-filter-key="status">
                <option value="all" ${config.status === "all" ? "selected" : ""}>All Status</option>
                ${statusOptions
                  .map(
                    (s) =>
                      `<option value="${s}" ${config.status === s ? "selected" : ""}>${Utils.capitalize(s)}</option>`,
                  )
                  .join("")}
              </select>
              <select class="control" data-filter="${tableKey}" data-filter-key="vehicle">
                <option value="all" ${config.vehicle === "all" ? "selected" : ""}>All Vehicles</option>
                ${vehicleOpts
                  .map(
                    (v) =>
                      `<option value="${v.toLowerCase()}" ${config.vehicle === v.toLowerCase() ? "selected" : ""}>${Utils.escape(v)}</option>`,
                  )
                  .join("")}
              </select>
              <select class="control" data-filter="${tableKey}" data-filter-key="date">
                <option value="all" ${config.date === "all" ? "selected" : ""}>All Dates</option>
                ${monthOpts
                  .map(
                    (m) =>
                      `<option value="${m}" ${config.date === m ? "selected" : ""}>${m}</option>`,
                  )
                  .join("")}
              </select>
            </div>
            <div class="toolbar-right">
              ${
                addLabel
                  ? `<button class="btn btn-primary" data-nav="${Utils.escape(addView || "")}">${Utils.escape(addLabel)}</button>`
                  : ""
              }
            </div>
          </div>
        `;

          const tableRows = filtered.length
            ? filtered
                .map(
                  (row) => `
              <tr>
                ${columns
                  .map((col) => {
                    if (col.type === "badge") {
                      const val = row[col.key] || "";
                      return `<td><span class="badge ${Utils.badgeClass(val)}">${Utils.escape(val)}</span></td>`;
                    }
                    return `<td>${Utils.escape(String(row[col.key] ?? "—"))}</td>`;
                  })
                  .join("")}
              </tr>
            `,
                )
                .join("")
            : `<tr><td colspan="${columns.length}" class="empty-state">No matching records found for the current filters.</td></tr>`;

          const content = `
          ${toolbar}
          <div class="table-wrap">
            <table>
              <thead>
                <tr>${columns.map((col) => `<th>${Utils.escape(col.label)}</th>`).join("")}</tr>
              </thead>
              <tbody>${tableRows}</tbody>
            </table>
          </div>

          return Components.card({ title, subtitle, content });

        /* ── Form Field ── */
        formField(field) {
          if (field.section) {
            return `<div class="form-section"><h4>${Utils.escape(field.section)}</h4></div>`;
          }

          const cls = field.full ? "field full" : "field";
          const req = field.required ? 'data-required="true"' : "";
          const errMsg = field.required
            ? '<span class="error-msg">This field is required.</span>'
            : "";

          if (field.type === "select") {
            const cond = field.conditionalTarget
              ? `data-conditional="${field.conditionalTarget}"`
              : "";
            return `
            <div class="${cls}">
              <label>${Utils.escape(field.label)}</label>
              <select name="${field.name}" ${cond} ${req}>
                <option value="">Select ${Utils.escape(field.label)}</option>
                ${field.options
                  .map(
                    (o) =>
                      `<option value="${Utils.escape(o)}">${Utils.escape(o)}</option>`,
                  )
                  .join("")}
              </select>
              ${errMsg}
            </div>
          `;
          }

          if (field.type === "chips") {
            return `
            <div class="${cls}">
              <label>${Utils.escape(field.label)}</label>
              <div class="choice-group">
                ${field.options
                  .map(
                    (opt, i) => `
                  <label class="choice-chip ${opt.toLowerCase()}">
                    <input type="radio" name="${field.name}" value="${Utils.escape(opt)}" ${i === 0 ? "checked" : ""}>
                    <span class="choice-pill">${Utils.escape(opt)}</span>
                  </label>
                `,
                  )
                  .join("")}
              </div>
              ${field.hint ? `<div class="field-hint">${Utils.escape(field.hint)}</div>` : ""}
            </div>
          `;
          }

          if (field.type === "textarea") {
            return `
            <div class="${cls}">
              <label>${Utils.escape(field.label)}</label>
              <textarea name="${field.name}" placeholder="${Utils.escape(field.placeholder || "")}" ${req}></textarea>
              ${errMsg}
            </div>
          `;
          }

          return `
          <div class="${cls}">
            <label>${Utils.escape(field.label)}</label>
            <input name="${field.name}" type="${field.type}"
                   placeholder="${Utils.escape(field.placeholder || "")}" ${req} />
            ${errMsg}
          </div>

      /* ═══════════════════════════════════════════════════════════════

        dashboard() {

        "access-denied"() {
          const userRole = Auth.getUserRole() || "Unknown";
          const attemptedRoute = appState.deniedRoute || "this module";

          return `
            <div class="card" style="max-width: 500px; margin: 80px auto; text-align: center; overflow: visible;">
              <div class="card-body" style="padding: 40px 30px;">
                <div style="width: 64px; height: 64px; background: #fef2f2; color: #dc2626; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: -72px auto 20px auto; border: 4px solid var(--bg); box-shadow: 0 4px 12px rgba(220, 38, 38, 0.15);">
                  🔒
                </div>
                <h2 style="font-size: 22px; margin: 0 0 12px; font-weight: 800; letter-spacing: -0.02em;">403 Access Restricted</h2>
                <p style="color: var(--muted); line-height: 1.6; margin-bottom: 24px; font-size: 14px;">
                  Your current role (<strong style="text-transform: capitalize; color: var(--text);">${Utils.escape(userRole)}</strong>) 
                  does not have permission to view <strong>${Utils.escape(attemptedRoute)}</strong>.
                </p>
                <button class="btn btn-primary" onclick="Router.navigate(DEFAULT_ROUTE_BY_ROLE[Auth.getUserRole()] || 'dashboard')" style="width: 100%;">
                  Return to Workspace
                </button>
              </div>
            </div>
          `;
        },
      };

      /* ═══════════════════════════════════════════════════════════════
       ROUTER
    ═══════════════════════════════════════════════════════════════ */
      const Router = {
        navigate(viewId) {
          if (!Auth.requireValidSession()) return;
          const userRole = Auth.getUserRole();
          const target = resolveNavigationTarget(viewId, userRole);

          // Role-based route guard
          if (!target.allowed) {
            Utils.toast("Access Denied: Insufficient Permissions", "error");
            appState.currentView = "access-denied";
            appState.deniedRoute = target.deniedRoute;

            if (window.innerWidth <= 900) {
              appState.mobileSidebarOpen = false;
              Shell.sync();
            }
            window.history.replaceState(null, null, "#access-denied");
            Persist.saveUI();
            Renderer.page();
            window.scrollTo({ top: 0, behavior: "smooth" });
            return;
          }

          appState.currentView = target.viewId;
          if (target.viewId !== "access-denied") {
            window.history.replaceState(null, null, "#" + target.viewId);
          }
          if (window.innerWidth <= 900) {
            appState.mobileSidebarOpen = false;
            Shell.sync();
          }
          Persist.saveUI();
          Renderer.page();
          window.scrollTo({ top: 0, behavior: "smooth" });
        },
      };

      /* ═══════════════════════════════════════════════════════════════
       SHELL
    ═══════════════════════════════════════════════════════════════ */
      const Shell = {
        sync() {
          const shell = document.getElementById("appShell");
          shell.classList.toggle(
            "sidebar-collapsed",
            appState.sidebarCollapsed && window.innerWidth > 900,
          );
          shell.classList.toggle(
            "mobile-sidebar-open",
            appState.mobileSidebarOpen && window.innerWidth <= 900,
          );
        },
      };

      /* ═══════════════════════════════════════════════════════════════
       RENDERER
    ═══════════════════════════════════════════════════════════════ */
      const Renderer = {
        sidebar() {
          document.getElementById("sidebar").innerHTML = Components.sidebar();
          document.querySelectorAll("[data-nav]").forEach((el) => {
            const view = el.dataset.nav;
            if (!view) return;
            const handler = () => Router.navigate(view);
            el.addEventListener("click", handler);
            el.addEventListener("keydown", (e) => {
              if (e.key === "Enter" || e.key === " ") handler();
            });
          });
        },

        topbar() {
          document.getElementById("topbar").innerHTML = Components.topbar();

          document
            .getElementById("sidebarToggle")
            .addEventListener("click", () => {
              if (window.innerWidth <= 900) {
                appState.mobileSidebarOpen = !appState.mobileSidebarOpen;
              } else {
                appState.sidebarCollapsed = !appState.sidebarCollapsed;
              }
              Shell.sync();
              Persist.saveUI();
            });

          document
            .getElementById("globalSearch")
            .addEventListener("input", (e) => {
              appState.search = e.target.value;
              Persist.saveUI();
              Renderer.pageContent();
            });

          const avatarBtn = document.getElementById("avatarBtn");
          const profileMenu = document.getElementById("profileMenu");
          avatarBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            const isOpen = profileMenu.classList.toggle("open");
            avatarBtn.setAttribute("aria-expanded", isOpen);
          });
          document.addEventListener("click", () => {
            profileMenu.classList.remove("open");
            avatarBtn.setAttribute("aria-expanded", "false");
          });

          // Logout button
          const logoutBtn = document.getElementById("logoutBtn");
          if (logoutBtn) {
            logoutBtn.addEventListener("click", (e) => {
              e.stopPropagation();
              Auth.logoutUser();
            });
          }
        },

        pageContent() {
          const root = document.getElementById("pageRoot");
          const viewFn = Views[appState.currentView] || Views.dashboard;
          root.innerHTML = viewFn.call(Views);
          Renderer.bindPageEvents();
        },

        page(rerenderTopbar = true) {
          this.pageContent();
          if (rerenderTopbar) this.topbar();
          this.sidebar();
        },

        bindPageEvents() {
          /* data-nav on any element navigates to the target view */
          document.querySelectorAll("[data-nav]").forEach((el) => {
            if (el.closest(".sidebar")) return; // sidebar handles its own
            const view = el.dataset.nav;
            if (!view) return;
            el.addEventListener("click", () => Router.navigate(view));
          });

          /* Table filter dropdowns */
          document.querySelectorAll("[data-filter]").forEach((control) => {
            control.addEventListener("change", () => {
              const tableKey = control.dataset.filter;
              const filterKey = control.dataset.filterKey;
              if (appState.filters[tableKey]) {
                appState.filters[tableKey][filterKey] = control.value;
              }
              Persist.saveUI();
              Renderer.pageContent();
              Renderer.sidebar(); // keep active state
            });
          });

          /* Form behaviour */
          this.bindForm();
        },

        bindForm() {
          const form = document.getElementById("salesEnquiryForm");

          /* ── Appointment Form ── */
          const apptForm = document.getElementById("appointmentForm");
          if (apptForm) {
            const apptValidate = () => {
              let valid = true;
              apptForm
                .querySelectorAll('[data-required="true"]')
                .forEach((el) => {
                  const empty = !el.value.trim();
                  const parent = el.closest(".field");
                  if (parent) parent.classList.toggle("has-error", empty);
                  el.classList.toggle("error", empty);
                  if (empty) valid = false;
                });
              return valid;
            };

            apptForm
              .querySelectorAll('[data-required="true"]')
              .forEach((el) => {
                el.addEventListener("input", () => {
                  if (el.value.trim()) {
                    const parent = el.closest(".field");
                    if (parent) parent.classList.remove("has-error");
                    el.classList.remove("error");
                  }
                });
              });

            apptForm.addEventListener("submit", async (e) => {
              e.preventDefault();

              if (!apptValidate()) {
                Utils.toast("Please fill all required fields.", "error");
                return;
              }

              const get = (name) =>
                apptForm.querySelector(`[name="${name}"]`)?.value?.trim() || "";
              const rawTime = get("apptTime");
              const [h, m] = rawTime.split(":").map(Number);
              const suffix = h >= 12 ? "PM" : "AM";
              const hour12 = h % 12 || 12;
              const formattedTime = `${String(hour12).padStart(2, "0")}:${String(m).padStart(2, "0")} ${suffix}`;

              const payload = {
                id: `SABP-${Date.now()}`,
                customer: get("apptCustomer"),
                vehicle: get("apptVehicle"),
                date: get("apptDate"),
                time: formattedTime,
                status: get("apptStatus") || "Scheduled",
              };

              try {
                const saved = await Api.createAppointment(payload);

                const mapped = {
                  id: saved.appointment_id,
                  customer: saved.customer,
                  vehicle: saved.vehicle,
                  date: saved.date,
                  time: saved.time,
                  status: saved.status,
                };

                Store.addAppointment(mapped);

                Utils.toast(
                  `Appointment booked for ${mapped.customer} on ${mapped.date} at ${mapped.time}.`,
                  "success",
                );

                Router.navigate("appointments");
              } catch (error) {
                console.error("Create appointment failed:", error);
                Utils.toast("Failed to save appointment to server.", "error");
              }
            });
          }

          if (!form) return;

          /* Conditional field visibility */
          const conditionalMap = {
            financeDetails: (val) => val === "finance" || val === "emi",
            exchangeDetails: (val) => val === "yes" || val === "maybe",
          };

          form.querySelectorAll("[data-conditional]").forEach((select) => {
            const targetId = select.dataset.conditional;
            const target = document.getElementById(targetId);
            const test = conditionalMap[targetId] || (() => false);

            const toggle = () => {
              if (target)
                target.classList.toggle(
                  "show",
                  test((select.value || "").toLowerCase()),
                );
            };
            select.addEventListener("change", toggle);
            toggle();
          });

          /* Inline validation */
          const validate = () => {
            let valid = true;
            form.querySelectorAll('[data-required="true"]').forEach((el) => {
              const empty = !el.value.trim();
              const parent = el.closest(".field");
              if (parent) parent.classList.toggle("has-error", empty);
              el.classList.toggle("error", empty);
              if (empty) valid = false;
            });
            return valid;
          };

          form.querySelectorAll('[data-required="true"]').forEach((el) => {
            el.addEventListener("input", () => {
              if (el.value.trim()) {
                const parent = el.closest(".field");
                if (parent) parent.classList.remove("has-error");
                el.classList.remove("error");
              }
            });
          });

          /* Submit */
          form.addEventListener("submit", async (e) => {
            e.preventDefault();

            if (!validate()) {
              Utils.toast("Please fill all required fields.", "error");
              return;
            }

            const get = (name) =>
              form.querySelector(`[name="${name}"]`)?.value?.trim() || "";
            const getChecked = (name) =>
              form.querySelector(`[name="${name}"]:checked`)?.value || "Hot";

            const payload = {
              id: `SE-${String(Date.now()).slice(-5)}`,
              customer: get("customerName") || "Customer",
              vehicle: get("modelName") || "Selected model",
              temperature: getChecked("leadTemperature"),
              status: get("salesEnquiryStatus") || "Submitted",
              date: new Date().toISOString().slice(0, 10),
              source: get("enquirySource") || "Walk-in",
            };

            try {
              const saved = await Api.createEnquiry(payload);

              const mapped = {
                id: saved.enquiry_id,
                customer: saved.customer,
                vehicle: saved.vehicle,
                temperature: saved.temperature,
                status: saved.status,
                date: saved.date,
                source: saved.source,
              };

              Store.addEnquiry(mapped);

              Utils.toast(
                `Enquiry for ${mapped.customer} submitted. Lead: ${mapped.temperature} | ${mapped.vehicle}`,
                "success",
              );

              Router.navigate("sales-enquiries");
            } catch (error) {
              console.error("Create enquiry failed:", error);
              Utils.toast("Failed to save enquiry to server.", "error");
            }
          });

          /* Reset */
          form.addEventListener("reset", () => {
            setTimeout(() => {
              form
                .querySelectorAll(".conditional-section")
                .forEach((el) => el.classList.remove("show"));
              form
                .querySelectorAll(".error")
                .forEach((el) => el.classList.remove("error"));
              form
                .querySelectorAll(".field")
                .forEach((f) => f.classList.remove("has-error"));
            }, 10);
          });
        },
      };

      /* ═══════════════════════════════════════════════════════════════
       INIT
    ═══════════════════════════════════════════════════════════════ */
      async function init() {
        Persist.loadUI();

        window.addEventListener("hashchange", () => {
          const hash = window.location.hash.replace("#", "");
          if (
            hash &&
            hash !== appState.currentView &&
            hash !== "access-denied"
          ) {
            Router.navigate(hash);
          }
        });

        // Auth MUST be initialized before any protected data is loaded.
        // initializeAuth() shows the login page if no valid session exists
        // and wires up the login form. Data loading only proceeds when authenticated.
        await Auth.initializeAuth();

        // Only load backend data if the user is authenticated
        if (
          Auth.isAuthenticated() &&
          appState.currentView !== "access-denied"
        ) {
          await Actions.refreshAll();
        }

        Renderer.topbar();
        Renderer.pageContent();
        Renderer.sidebar();
        Shell.sync();
        window.addEventListener("resize", Shell.sync.bind(Shell));
      }
      init();
    </script>
  </body>
</html>
