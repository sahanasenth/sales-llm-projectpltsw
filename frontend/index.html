<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sales CRM Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com/" />
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Sora:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f4f7fb;
        --panel: #ffffff;
        --panel-2: #f8fafc;
        --text: #0f172a;
        --muted: #64748b;
        --line: #e2e8f0;
        --primary: #0f6c5c;
        --primary-dark: #0a4d42;
        --primary-soft: #e7f5f1;
        --blue: #2563eb;
        --blue-soft: #eff6ff;
        --green: #059669;
        --green-soft: #ecfdf5;
        --gray-soft: #f1f5f9;
        --amber-soft: #fffbeb;
        --amber: #d97706;
        --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        --radius: 18px;
        --sidebar-width: 284px;
        --sidebar-collapsed: 88px;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      body {
        min-height: 100vh;
      }
      button,
      input,
      select,
      textarea {
        font: inherit;
      }
      a {
        text-decoration: none;
        color: inherit;
      }

      .app-shell {
        display: grid;
        grid-template-columns: var(--sidebar-width) 1fr;
        min-height: 100vh;
        transition: grid-template-columns 0.25s ease;
      }
      .app-shell.sidebar-collapsed {
        grid-template-columns: var(--sidebar-collapsed) 1fr;
      }

      .sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
        background: linear-gradient(180deg, #0d3f37 0%, #0b2f2a 100%);
        color: #e5f6f2;
        padding: 20px 16px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px;
        min-height: 58px;
      }
      .brand-badge {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.14);
        display: grid;
        place-items: center;
        font-weight: 800;
        letter-spacing: 0.04em;
        flex: 0 0 auto;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
      }
      .brand-copy h1 {
        font-size: 15px;
        margin: 0;
        font-weight: 800;
      }
      .brand-copy p {
        margin: 4px 0 0;
        color: rgba(229, 246, 242, 0.72);
        font-size: 12px;
      }

      .nav-group-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: rgba(229, 246, 242, 0.58);
        margin: 8px 10px 2px;
        font-weight: 700;
      }
      .nav-menu {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .nav-link {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 14px;
        color: rgba(229, 246, 242, 0.86);
        transition:
          background 0.2s ease,
          transform 0.2s ease,
          color 0.2s ease;
        cursor: pointer;
        user-select: none;
        border: 1px solid transparent;
      }
      .nav-link:hover {
        background: rgba(255, 255, 255, 0.08);
        transform: translateX(2px);
      }
      .nav-link.active {
        background: rgba(255, 255, 255, 0.14);
        color: #ffffff;
        border-color: rgba(255, 255, 255, 0.1);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }
      .nav-icon {
        width: 22px;
        text-align: center;
        font-size: 18px;
        flex: 0 0 auto;
      }
      .nav-text {
        font-size: 14px;
        font-weight: 600;
        white-space: nowrap;
      }

      .sidebar-footer {
        margin-top: auto;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 18px;
        padding: 14px;
      }
      .sidebar-footer h3 {
        margin: 0 0 6px;
        font-size: 14px;
      }
      .sidebar-footer p {
        margin: 0;
        font-size: 12px;
        line-height: 1.5;
        color: rgba(229, 246, 242, 0.72);
      }

      .main {
        min-width: 0;
        display: flex;
        flex-direction: column;
      }
      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        background: rgba(244, 247, 251, 0.82);
        backdrop-filter: blur(14px);
        border-bottom: 1px solid rgba(148, 163, 184, 0.16);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 18px 28px;
      }
      .topbar-left {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
        flex: 1;
      }
      .icon-btn {
        width: 42px;
        height: 42px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
        display: grid;
        place-items: center;
        cursor: pointer;
        color: var(--text);
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
      }
      .search-box {
        flex: 1;
        min-width: 220px;
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 0 14px;
        height: 46px;
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
      }
      .search-box input {
        flex: 1;
        border: 0;
        outline: none;
        background: transparent;
        color: var(--text);
      }
      .topbar-right {
        display: flex;
        align-items: center;
        gap: 12px;
        position: relative;
      }
      .avatar-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 8px 6px 6px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--panel);
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
      }
      .avatar {
        width: 36px;
        height: 36px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, var(--primary), #16a085);
        color: white;
        font-weight: 800;
      }
      .avatar-copy strong {
        display: block;
        font-size: 13px;
        line-height: 1.1;
      }
      .avatar-copy span {
        display: block;
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }
      .profile-menu {
        position: absolute;
        right: 0;
        top: calc(100% + 10px);
        width: 210px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: var(--shadow);
        padding: 8px;
        display: none;
      }
      .profile-menu.open {
        display: block;
      }
      .profile-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        color: var(--text);
        cursor: pointer;
      }
      .profile-item:hover {
        background: var(--panel-2);
      }

      .page {
        padding: 28px;
        display: flex;
        flex-direction: column;
        gap: 22px;
      }
      .page-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
        flex-wrap: wrap;
      }
      .page-title h2 {
        margin: 0;
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.03em;
      }
      .page-title p {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.5;
        max-width: 760px;
      }
      .page-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 44px;
        border-radius: 12px;
        padding: 0 16px;
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--text);
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
      }
      .btn-primary {
        border-color: transparent;
        background: linear-gradient(135deg, var(--primary), #17856f);
        color: white;
        box-shadow: 0 10px 20px rgba(15, 108, 92, 0.18);
      }
      .btn-secondary {
        background: var(--panel-2);
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 18px;
      }
      .card {
        background: var(--panel);
        border: 1px solid rgba(226, 232, 240, 0.9);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .stat-card {
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .stat-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .stat-icon {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        background: var(--primary-soft);
        color: var(--primary-dark);
        font-size: 20px;
      }
      .stat-card small {
        color: var(--muted);
        font-weight: 600;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .stat-card h3 {
        margin: 0;
        font-size: 26px;
        letter-spacing: -0.03em;
      }
      .trend {
        font-size: 12px;
        font-weight: 700;
        color: var(--green);
      }

      .split-grid {
        display: grid;
        grid-template-columns: 1.5fr 1fr;
        gap: 18px;
      }
      .card-header {
        padding: 18px 20px 14px;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .card-header h3 {
        margin: 0;
        font-size: 18px;
      }
      .card-header p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 13px;
      }
      .card-body {
        padding: 18px 20px 20px;
      }

      .table-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 16px 20px;
        border-bottom: 1px solid var(--line);
        flex-wrap: wrap;
      }
      .toolbar-left,
      .toolbar-right {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .control {
        height: 42px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
        padding: 0 14px;
        color: var(--text);
        min-width: 130px;
        outline: none;
      }
      .control.search {
        min-width: 240px;
      }
      .table-wrap {
        width: 100%;
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 720px;
      }
      th,
      td {
        padding: 14px 20px;
        text-align: left;
        border-bottom: 1px solid var(--line);
        font-size: 14px;
      }
      th {
        color: var(--muted);
        font-weight: 700;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        background: #fbfdff;
        position: sticky;
        top: 0;
      }
      tbody tr:hover {
        background: #f8fbfd;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        height: 30px;
        padding: 0 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }
      .badge.submitted {
        background: var(--blue-soft);
        color: var(--blue);
      }
      .badge.draft {
        background: var(--gray-soft);
        color: #475569;
      }
      .badge.closed,
      .badge.completed {
        background: var(--green-soft);
        color: var(--green);
      }
      .badge.pending,
      .badge.scheduled {
        background: var(--amber-soft);
        color: var(--amber);
      }
      .badge.hot {
        background: #fef2f2;
        color: #dc2626;
      }
      .badge.warm {
        background: #fff7ed;
        color: #ea580c;
      }
      .badge.cold {
        background: #eff6ff;
        color: #2563eb;
      }

      .empty-state {
        padding: 26px 20px;
        color: var(--muted);
        text-align: center;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .field.full {
        grid-column: 1 / -1;
      }
      .field label {
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .field input,
      .field select,
      .field textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px 14px;
        background: var(--panel);
        outline: none;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }
      .field input.error,
      .field select.error,
      .field textarea.error {
        border-color: #dc2626;
        box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
      }
      .field .error-msg {
        font-size: 11px;
        color: #dc2626;
        margin-top: 2px;
        display: none;
      }
      .field.has-error .error-msg {
        display: block;
      }
      .field input:focus,
      .field select:focus,
      .field textarea:focus {
        border-color: rgba(15, 108, 92, 0.4);
        box-shadow: 0 0 0 4px rgba(15, 108, 92, 0.08);
      }
      .field textarea {
        min-height: 120px;
        resize: vertical;
      }
      .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 18px;
        flex-wrap: wrap;
      }

      .form-section {
        grid-column: 1 / -1;
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid var(--line);
      }
      .form-section:first-child {
        margin-top: 0;
        padding-top: 0;
        border-top: 0;
      }
      .form-section h4 {
        margin: 0 0 12px;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      .field-hint {
        font-size: 12px;
        color: var(--muted);
        margin-top: 4px;
      }

      .choice-group {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .choice-chip {
        position: relative;
        display: inline-flex;
        align-items: center;
        cursor: pointer;
      }
      .choice-chip input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }
      .choice-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 92px;
        height: 42px;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--panel);
        font-weight: 700;
        transition: all 0.2s ease;
      }
      .choice-chip input:checked + .choice-pill {
        border-color: transparent;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
      }
      .choice-chip.hot input:checked + .choice-pill {
        background: #fef2f2;
        color: #dc2626;
      }
      .choice-chip.warm input:checked + .choice-pill {
        background: #fff7ed;
        color: #ea580c;
      }
      .choice-chip.cold input:checked + .choice-pill {
        background: #eff6ff;
        color: #2563eb;
      }

      .conditional-section {
        grid-column: 1 / -1;
        display: none;
        padding: 16px;
        border: 1px dashed var(--line);
        border-radius: 16px;
        background: #fbfdff;
      }
      .conditional-section.show {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .helper-note {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 14px 16px;
        border-radius: 14px;
        background: var(--primary-soft);
        color: var(--primary-dark);
        font-size: 14px;
        line-height: 1.5;
        border: 1px solid rgba(15, 108, 92, 0.12);
      }

      .list-stack {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .list-item {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 14px 16px;
        border-radius: 14px;
        background: var(--panel-2);
        border: 1px solid var(--line);
      }
      .list-item strong {
        display: block;
        font-size: 14px;
      }
      .list-item span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin-top: 4px;
      }

      .sidebar-collapsed .brand-copy,
      .sidebar-collapsed .nav-text,
      .sidebar-collapsed .nav-group-title,
      .sidebar-collapsed .sidebar-footer {
        display: none;
      }
      .sidebar-collapsed .brand,
      .sidebar-collapsed .nav-link {
        justify-content: center;
      }

      .toast-container {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 999;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .toast {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px 18px;
        box-shadow: var(--shadow);
        font-size: 14px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 260px;
        animation: slideIn 0.25s ease;
      }
      .toast.success {
        border-left: 4px solid var(--green);
      }
      .toast.error {
        border-left: 4px solid #dc2626;
      }
      .toast.warning {
        border-left: 4px solid var(--amber);
        color: var(--amber);
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 1180px) {
        .stats-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .split-grid {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 900px) {
        .app-shell {
          grid-template-columns: 1fr;
        }
        .sidebar {
          position: fixed;
          z-index: 40;
          width: var(--sidebar-width);
          transform: translateX(-100%);
          transition: transform 0.25s ease;
        }
        .app-shell.mobile-sidebar-open .sidebar {
          transform: translateX(0);
        }
        .main {
          width: 100%;
        }
        .page,
        .topbar {
          padding-left: 18px;
          padding-right: 18px;
        }
        .stats-grid {
          grid-template-columns: 1fr;
        }
        .form-grid {
          grid-template-columns: 1fr;
        }
        .avatar-copy {
          display: none;
        }
      }

      /* ═══════════════════════════════════════════════════════════════
       AUTH — LOGIN PAGE
    ═══════════════════════════════════════════════════════════════ */
      #authOverlay {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #060e0c;
        transition: opacity 0.5s ease;
      }
      #authOverlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      /* Animated background mesh */
      .auth-bg {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      .auth-bg-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        animation: orbFloat 8s ease-in-out infinite;
      }
      .auth-bg-orb:nth-child(1) {
        width: 500px;
        height: 500px;
        background: radial-gradient(
          circle,
          rgba(15, 108, 92, 0.35) 0%,
          transparent 70%
        );
        top: -120px;
        left: -120px;
        animation-delay: 0s;
      }
      .auth-bg-orb:nth-child(2) {
        width: 400px;
        height: 400px;
        background: radial-gradient(
          circle,
          rgba(37, 99, 235, 0.2) 0%,
          transparent 70%
        );
        bottom: -80px;
        right: -80px;
        animation-delay: -3s;
      }
      .auth-bg-orb:nth-child(3) {
        width: 300px;
        height: 300px;
        background: radial-gradient(
          circle,
          rgba(15, 108, 92, 0.15) 0%,
          transparent 70%
        );
        top: 50%;
        left: 60%;
        animation-delay: -5s;
      }
      @keyframes orbFloat {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(20px, -30px) scale(1.05);
        }
        66% {
          transform: translate(-15px, 20px) scale(0.97);
        }
      }

      /* Grid texture overlay */
      .auth-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size: 48px 48px;
        pointer-events: none;
      }

      .auth-card {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 440px;
        margin: 0 20px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: 28px;
        padding: 44px 44px 40px;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.03),
          0 40px 80px rgba(0, 0, 0, 0.6),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(24px);
        animation: authCardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      @keyframes authCardIn {
        from {
          opacity: 0;
          transform: translateY(32px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .auth-brand {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 36px;
      }
      .auth-brand-badge {
        width: 48px;
        height: 48px;
        border-radius: 16px;
        background: linear-gradient(135deg, var(--primary), #17a589);
        display: grid;
        place-items: center;
        font-family: "Sora", sans-serif;
        font-weight: 800;
        font-size: 16px;
        color: white;
        box-shadow: 0 8px 20px rgba(15, 108, 92, 0.4);
        flex: 0 0 auto;
      }
      .auth-brand-copy h2 {
        margin: 0;
        font-family: "Sora", sans-serif;
        font-size: 17px;
        font-weight: 800;
        color: #ffffff;
        letter-spacing: -0.02em;
      }
      .auth-brand-copy p {
        margin: 3px 0 0;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.4);
        font-weight: 500;
      }

      .auth-heading {
        margin: 0 0 6px;
        font-family: "Sora", sans-serif;
        font-size: 26px;
        font-weight: 800;
        color: #ffffff;
        letter-spacing: -0.03em;
      }
      .auth-subheading {
        margin: 0 0 32px;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.42);
        line-height: 1.5;
      }

      .auth-field {
        margin-bottom: 18px;
      }
      .auth-field label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.45);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 8px;
      }
      .auth-input-wrap {
        position: relative;
      }
      .auth-input-icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 16px;
        opacity: 0.4;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .auth-field input {
        width: 100%;
        height: 52px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        padding: 0 16px 0 46px;
        color: #ffffff;
        font-size: 15px;
        font-weight: 500;
        outline: none;
        transition:
          border-color 0.2s ease,
          background 0.2s ease,
          box-shadow 0.2s ease;
      }
      .auth-field input::placeholder {
        color: rgba(255, 255, 255, 0.22);
      }
      .auth-field input:focus {
        border-color: rgba(15, 108, 92, 0.7);
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 0 4px rgba(15, 108, 92, 0.15);
      }
      .auth-field input:focus + .auth-input-icon,
      .auth-input-wrap:focus-within .auth-input-icon {
        opacity: 0.75;
      }
      .auth-field input.auth-error {
        border-color: rgba(220, 38, 38, 0.7);
        box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.12);
      }

      /* Password toggle */
      .auth-pw-toggle {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.35);
        cursor: pointer;
        padding: 4px;
        font-size: 14px;
        transition: color 0.2s;
        line-height: 1;
      }
      .auth-pw-toggle:hover {
        color: rgba(255, 255, 255, 0.7);
      }

      .auth-error-banner {
        display: none;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        background: rgba(220, 38, 38, 0.12);
        border: 1px solid rgba(220, 38, 38, 0.25);
        border-radius: 12px;
        margin-bottom: 18px;
        color: #f87171;
        font-size: 13px;
        font-weight: 600;
        animation: shake 0.4s ease;
      }
      .auth-error-banner.visible {
        display: flex;
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-6px);
        }
        40% {
          transform: translateX(6px);
        }
        60% {
          transform: translateX(-4px);
        }
        80% {
          transform: translateX(4px);
        }
      }

      .auth-btn {
        width: 100%;
        height: 54px;
        border: none;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--primary) 0%, #17a589 100%);
        color: white;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        margin-top: 8px;
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease,
          opacity 0.15s ease;
        box-shadow: 0 12px 28px rgba(15, 108, 92, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        position: relative;
        overflow: hidden;
        letter-spacing: 0.01em;
      }
      .auth-btn::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.14) 0%,
          transparent 60%
        );
        border-radius: inherit;
      }
      .auth-btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 18px 36px rgba(15, 108, 92, 0.4);
      }
      .auth-btn:active:not(:disabled) {
        transform: translateY(0);
      }
      .auth-btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      /* Loading spinner */
      .auth-spinner {
        width: 20px;
        height: 20px;
        border: 2.5px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.65s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Dashboard hidden while on login */
      #appShell {
        display: none;
      }
      #appShell.auth-visible {
        display: grid;
        animation: dashIn 0.4s ease both;
      }
      @keyframes dashIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Logout button in profile menu */
      .profile-item.logout-item {
        color: #dc2626;
      }

      /* Auth session indicator in topbar */
      .auth-session-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        font-weight: 700;
        color: var(--green);
        background: var(--green-soft);
        border: 1px solid rgba(5, 150, 105, 0.2);
        border-radius: 999px;
        padding: 4px 10px;
      }
      .auth-session-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--green);
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(0.8);
        }
      }

      /* ═══════════════════════════════════════════════════════════════
       FIX 1 — REMEMBER ME CHECKBOX
    ═══════════════════════════════════════════════════════════════ */
      .auth-remember-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 6px 0 20px;
      }
      .auth-remember-label {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        user-select: none;
      }
      /* Hide native checkbox */
      .auth-remember-label input[type="checkbox"] {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
        pointer-events: none;
      }
      /* Custom checkbox box */
      .auth-remember-checkbox {
        width: 18px;
        height: 18px;
        border-radius: 6px;
        border: 1.5px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.05);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
        transition:
          border-color 0.2s,
          background 0.2s,
          box-shadow 0.2s;
        position: relative;
      }
      /* Checkmark via pseudo-element */
      .auth-remember-checkbox::after {
        content: "";
        width: 5px;
        height: 9px;
        border: 2px solid white;
        border-top: none;
        border-left: none;
        transform: rotate(45deg) translateY(-1px);
        opacity: 0;
        transition: opacity 0.15s ease;
      }
      /* Checked state */
      .auth-remember-label input:checked + .auth-remember-checkbox {
        background: var(--primary);
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(15, 108, 92, 0.2);
      }
      .auth-remember-label input:checked + .auth-remember-checkbox::after {
        opacity: 1;
      }
      .auth-remember-label:hover .auth-remember-checkbox {
        border-color: rgba(255, 255, 255, 0.4);
      }
      .auth-remember-text {
        font-size: 13px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.5);
      }

      /* ═══════════════════════════════════════════════════════════════
       FIX 2 — BROWSER AUTOFILL STYLING (Chrome / Edge / WebKit)
       Overrides the default yellow/white autofill background to match
       the dark glass-morphism login card design.
    ═══════════════════════════════════════════════════════════════ */
      .auth-field input:-webkit-autofill,
      .auth-field input:-webkit-autofill:hover,
      .auth-field input:-webkit-autofill:focus,
      .auth-field input:-webkit-autofill:active {
        /* Trick: use an enormous inset box-shadow to repaint the background */
        -webkit-box-shadow: 0 0 0 1000px rgba(15, 25, 22, 0.95) inset !important;
        box-shadow: 0 0 0 1000px rgba(15, 25, 22, 0.95) inset !important;
        -webkit-text-fill-color: #ffffff !important;
        caret-color: #ffffff;
        border-color: rgba(15, 108, 92, 0.5) !important;
        border-radius: 14px;
        transition: background-color 9999s ease-in-out 0s; /* Delay browser override */
      }
      /* Firefox autofill */
      .auth-field input:autofill {
        background: rgba(15, 25, 22, 0.95) !important;
        color: #ffffff !important;
      }

      /* ═══════════════════════════════════════════════════════════════
       FIX 3 — MOBILE RESPONSIVENESS FOR AUTH CARD
    ═══════════════════════════════════════════════════════════════ */

      /* Tablets (max 768px) */
      @media (max-width: 768px) {
        .auth-card {
          padding: 36px 32px 32px;
          border-radius: 22px;
          margin: 0 16px;
        }
        .auth-heading {
          font-size: 22px;
        }
        .auth-subheading {
          font-size: 13px;
          margin-bottom: 24px;
        }
        .auth-brand {
          margin-bottom: 28px;
        }
        .auth-brand-copy h2 {
          font-size: 15px;
        }
        .auth-field input {
          height: 48px;
          font-size: 14px;
        }
        .auth-btn {
          height: 50px;
          font-size: 14px;
        }
      }

      /* Small phones (max 480px) */
      @media (max-width: 480px) {
        #authOverlay {
          align-items: flex-start;
          padding-top: 40px;
          overflow-y: auto;
        }
        .auth-card {
          padding: 28px 20px 24px;
          border-radius: 18px;
          margin: 0 12px 40px;
          max-width: 100%;
        }
        .auth-heading {
          font-size: 20px;
        }
        .auth-subheading {
          font-size: 12px;
          margin-bottom: 20px;
        }
        .auth-brand {
          margin-bottom: 22px;
          gap: 10px;
        }
        .auth-brand-badge {
          width: 40px;
          height: 40px;
          font-size: 13px;
          border-radius: 12px;
        }
        .auth-brand-copy h2 {
          font-size: 14px;
        }
        .auth-brand-copy p {
          font-size: 11px;
        }
        .auth-field {
          margin-bottom: 14px;
        }
        .auth-field input {
          height: 46px;
          font-size: 14px;
          padding: 0 14px 0 42px;
        }
        .auth-btn {
          height: 48px;
          font-size: 14px;
          margin-top: 4px;
        }
        .auth-remember-text {
          font-size: 12px;
        }
        .auth-error-banner {
          font-size: 12px;
          padding: 10px 12px;
        }
      }

      /* Very small screens (max 360px) */
      @media (max-width: 360px) {
        .auth-card {
          padding: 24px 16px 20px;
          margin: 0 8px 32px;
        }
        .auth-heading {
          font-size: 18px;
        }
        .auth-field input {
          height: 44px;
        }
        .auth-btn {
          height: 46px;
        }
      }
    </style>
  </head>
  <body>
    <!-- ═══════════════════════════════════════════════════════════════
       AUTH OVERLAY — Login Page
  ═══════════════════════════════════════════════════════════════ -->
    <div id="authOverlay" role="main" aria-label="Login">
      <!-- Animated background -->
      <div class="auth-bg" aria-hidden="true">
        <div class="auth-bg-orb"></div>
        <div class="auth-bg-orb"></div>
        <div class="auth-bg-orb"></div>
        <div class="auth-grid"></div>
      </div>

      <!-- Login card -->
      <div class="auth-card" role="form" aria-labelledby="authHeading">
        <div class="auth-brand">
          <div class="auth-brand-badge">SC</div>
          <div class="auth-brand-copy">
            <h2>Sales Command</h2>
            <p>Professional CRM Workspace</p>
          </div>
        </div>

        <h1 class="auth-heading" id="authHeading">Welcome back</h1>
        <p class="auth-subheading">
          Sign in to access your CRM dashboard and sales tools.
        </p>

        <!-- Error banner -->
        <div
          class="auth-error-banner"
          id="authErrorBanner"
          role="alert"
          aria-live="assertive"
        >
          <span>⚠</span>
          <span id="authErrorText">Invalid credentials. Please try again.</span>
        </div>

        <!-- Login form -->
        <form id="loginForm" novalidate autocomplete="on">
          <div class="auth-field">
            <label for="authUsername">Username or Email</label>
            <div class="auth-input-wrap">
              <input
                type="text"
                id="authUsername"
                name="username"
                placeholder="Enter username or email"
                autocomplete="username"
                aria-required="true"
              />
              <span class="auth-input-icon" aria-hidden="true">👤</span>
            </div>
          </div>

          <div class="auth-field">
            <label for="authPassword">Password</label>
            <div class="auth-input-wrap">
              <input
                type="password"
                id="authPassword"
                name="password"
                placeholder="Enter your password"
                autocomplete="current-password"
                aria-required="true"
              />
              <span class="auth-input-icon" aria-hidden="true">🔑</span>
              <button
                type="button"
                class="auth-pw-toggle"
                id="pwToggle"
                aria-label="Toggle password visibility"
              >
                👁
              </button>
            </div>
          </div>

          <!-- Remember Me -->
          <div class="auth-remember-row">
            <label class="auth-remember-label" for="rememberMe">
              <input type="checkbox" id="rememberMe" name="rememberMe" />
              <span class="auth-remember-checkbox" aria-hidden="true"></span>
              <span class="auth-remember-text">Remember me for 7 days</span>
            </label>
          </div>

          <button
            type="submit"
            class="auth-btn"
            id="loginBtn"
            aria-label="Sign in"
          >
            <span id="loginBtnText">Sign In</span>
          </button>
        </form>
      </div>
    </div>

    <div class="app-shell" id="appShell">
      <aside class="sidebar" id="sidebar"></aside>
      <div class="main">
        <header class="topbar" id="topbar"></header>
        <main class="page" id="pageRoot"></main>
      </div>
    </div>
    <div class="toast-container" id="toastContainer"></div>

    <script src="index.js"></script>
  </body>
</html>
